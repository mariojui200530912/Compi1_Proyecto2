<div class="table-responsive">
  <table class="table yfera-table table-dark m-0">
    <thead>
      <tr>
        <th style="width: 50px;">#</th>
        <th class="text-warning">Identificador</th>
        <th class="text-info">Tipo de Dato</th>
        <th>Valor Actual</th>
        <th class="text-center">Ubicación</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let sym of simbolos; let i = index">
        <td class="text-muted">{{ i + 1 }}</td>
        <td class="fw-bold text-light">{{ sym.id }}</td>
        <td>
          <code class="text-info">{{ sym.type }}</code>
        </td>
        <td class="col-expand">
          <code class="text-success">{{ formatValue(sym.value) }}</code>
        </td>
        <td class="text-center">
          <span class="file-badge me-2">{{ sym.archivo || 'main.y' }}</span>
          <small class="text-muted">{{ sym.line }}:{{ sym.column }}</small>
        </td>
      </tr>
    </tbody>
  </table>
</div>
