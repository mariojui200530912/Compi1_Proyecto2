<div class="row g-0 vh-100 bg-dark overflow-hidden">
  <div class="col-md-3 d-flex flex-column border-end border-secondary h-100 sidebar-bg">
    <div class="p-3 border-bottom border-secondary d-flex align-items-center logo-area">
      <h5 class="m-0 text-primary fw-bold">YFERA IDE</h5>
    </div>
    <div class="flex-grow-1 overflow-auto">
      <yfera-file-explorer></yfera-file-explorer>
    </div>
  </div>

  <div class="col-md-9 d-flex flex-column h-100 p-0 overflow-hidden">
    <div
      class="d-flex justify-content-between align-items-center border-bottom border-secondary bg-toolbar flex-shrink-0"
    >
      <div class="d-flex overflow-auto tabs-container h-100">
        <div
          *ngFor="let file of fileService.openFiles()"
          class="tab-item px-3 py-2 border-end border-secondary d-flex align-items-center cursor-pointer"
          [class.active-tab]="fileService.activeFile()?.path === file.path"
          (click)="fileService.openFile(file)"
        >
          <span class="me-2 small">📄</span>
          <span class="file-name me-3">{{ file.name }}</span>
          <span class="close-icon text-muted" (click)="closeTab($event, file.path)">✕</span>
        </div>
      </div>

      <div class="controls px-2 d-flex gap-1 align-items-center flex-nowrap">
        <button
          class="btn btn-outline-info btn-sm"
          (click)="showColorPicker.set(!showColorPicker())"
        >
          🎨
        </button>

        <button class="btn btn-outline-light btn-sm text-nowrap" (click)="togglePreview()">
          {{ showPreview() ? '✕' : '👁 Preview' }}
        </button>

        <button
          *ngIf="compilacionExitosa()"
          class="btn btn-outline-primary btn-sm animate__animated animate__fadeIn"
          (click)="downloadProject()"
        >
          📥
        </button>

        <button class="btn btn-success btn-sm fw-bold text-nowrap" (click)="onCompile()">
          ▶ Compilar
        </button>
      </div>
    </div>
    <div class="flex-grow-1 d-flex overflow-hidden" style="min-height: 0">
      <ng-container *ngIf="fileService.activeFile() as file; else sinArchivo">
        <div [class]="showPreview() ? 'col-6' : 'col-12'" class="h-100 border-end border-secondary">
          <app-code-editor
            [(content)]="file.content"
            (contentChange)="fileService.updateActiveFileContent($event)"
          ></app-code-editor>
        </div>

        <div *ngIf="showPreview()" class="col-6 h-100">
          <app-preview-panel [html]="previewHtml"></app-preview-panel>
        </div>
      </ng-container>

      <ng-template #sinArchivo>
        <div
          class="flex-grow-1 d-flex flex-column align-items-center justify-content-center bg-editor-empty w-100"
        >
          <h1 class="display-1 opacity-10 fw-bold text-light">YFERA</h1>
          <p class="text-muted">Selecciona o crea un archivo para comenzar</p>
        </div>
      </ng-template>
    </div>

    <div class="bottom-area border-top border-secondary flex-shrink-0" style="height: 30%">
      <ul class="nav nav-tabs border-secondary bg-toolbar px-2">
        <li class="nav-item">
          <button
            class="nav-link py-1 px-3"
            [class.active]="activeBottomTab === 'errores'"
            (click)="activeBottomTab = 'errores'"
          >
            Errores
            <span class="badge bg-danger ms-1" *ngIf="listaErrores.length > 0">{{
              listaErrores.length
            }}</span>
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link py-1 px-3"
            [class.active]="activeBottomTab === 'simbolos'"
            (click)="activeBottomTab = 'simbolos'"
          >
            Símbolos
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link py-1 px-3"
            [class.active]="activeBottomTab === 'sql'"
            (click)="activeBottomTab = 'sql'"
          >
            Consola SQL
          </button>
        </li>
      </ul>

      <div class="tab-content-wrapper flex-grow-1 overflow-hidden bg-dark h-100">
        <div *ngIf="activeBottomTab === 'errores'" class="p-2 h-100 overflow-auto">
          <app-error-report [errores]="listaErrores"></app-error-report>
        </div>
        <div *ngIf="activeBottomTab === 'simbolos'" class="p-2 h-100 overflow-auto">
          <app-symbol-table></app-symbol-table>
        </div>
        <div *ngIf="activeBottomTab === 'sql'" class="h-100 w-100">
          <app-sql-console></app-sql-console>
        </div>
      </div>
    </div>
  </div>
</div>
