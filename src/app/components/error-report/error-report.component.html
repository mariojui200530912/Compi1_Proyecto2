<div class="table-responsive">
  <table class="table yfera-table table-dark m-0">
    <thead>
      <tr>
        <th style="width: 50px;">#</th>
        <th class="text-danger">Token</th>
        <th class="text-warning">Tipo Error</th>
        <th>Descripción</th>
        <th class="text-center">Ubicación</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let err of errores; let i = index">
        <td class="text-muted">{{ i + 1 }}</td>
        <td class="text-danger"><code>{{ err.lexema }}</code></td>
        <td class="small">{{ err.tipo }}</td>
        <td class="col-expand text-muted small">
          {{ err.descripcion }}
        </td>
        <td class="text-center">
          <span class="file-badge me-2">{{ err.archivo }}</span>
          <small class="text-muted">{{ err.linea }}:{{ err.columna }}</small>
        </td>
      </tr>
    </tbody>
  </table>
</div>
